apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ops5-alerts
  namespace: default
  labels:
    release: monitoring
spec:
  groups:
    - name: minecraft.rules
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="default"}[4m]) > 2
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            runbook: |
              See the Alert 1 runbook in the Ops 5 document.

        - alert: HighNodeCPU
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Node CPU usage above 80% for 2 minutes"
            runbook: |
              See the Alert 2 runbook in the Ops 5 document.

        - alert: MinecraftStatusUnhealthy
          expr: minecraft_status_healthy{} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Minecraft server is unhealthy"
            runbook: |
              See the Alert 3 runbook in the Ops 5 document.

