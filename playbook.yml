---
- name: Set up k3s
  user: ubuntu
  hosts: all
  become: true

  tasks:
    - name: Ensure system dependencies are installed
      apt:
        name:
          - curl
          - sudo
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Download and run k3s installation script
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s # Prevents rerun if k3s is already installed

    # Helm installation steps taken from class lab
    # https://cs312.alexulbrich.com/labs/observability-workshop/#deploying-the-monitoring-stack
    - name: Download and run Helm installation script
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm # Prevents rerun if helm is already installed
    - name: Add Helm repository + install monitoring stack
      shell: |
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts && \
        helm repo update && \
        helm install monitoring prometheus-community/kube-prometheus-stack -n monitoring --create-namespace -f values.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
