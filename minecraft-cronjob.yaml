# Conceptual architecture of the Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minecraft-backup
spec:
  schedule: "0 0 * * *" # Daily at midnight
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup-worker
            image: alpine:latest
            command: ["/bin/sh", "-c"]
            args:
              - |
                apk add --no-cache tar aws-cli && \
                tar -czf /tmp/world-backup.tar.gz -C /opt/minecraft/world . && \
                aws s3 cp /tmp/world-backup.tar.gz s3://cs312-wengor-minecraft-backups/backups/
            volumeMounts:
            - name: minecraft-data
              mountPath: /opt/minecraft/world
              readOnly: true
          volumes:
          - name: minecraft-data
            persistentVolumeClaim:
              claimName: minecraft-pvc
          restartPolicy: OnFailure
