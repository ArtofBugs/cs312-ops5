# Conceptual architecture of the Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: minecraft-backup
spec:
  schedule: "0 0 * * *" # Daily at midnight
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup-worker
            image: amazon/aws-cli:latest # Inherently has AWS CLI
            command: ["/bin/sh", "-c"]
            args:
              - yum install -y tar && tar -czf /tmp/world-backup.tar.gz /opt/minecraft/world && 
                aws s3 cp /tmp/world-backup.tar.gz s3://cs312-wengor-minecraft-backups/backups/
            volumeMounts:
            - name: minecraft-data
              mountPath: /opt/minecraft/world
              readOnly: true
          volumes:
          - name: minecraft-data
            persistentVolumeClaim:
              claimName: minecraft-pvc
          restartPolicy: OnFailure
