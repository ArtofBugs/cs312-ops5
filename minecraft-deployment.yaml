apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  labels:
    app: minecraft
spec:
  replicas: 1
  strategy:
    type: Recreate # CRITICAL: Releases PVC lock before creating the new pod during upgrades
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: minecraft
          image: 964324548466.dkr.ecr.us-east-1.amazonaws.com/ops3-ecr:v2.0.2
          imagePullPolicy: IfNotPresent
          env:
            - name: MOTD
              value: wengor-ops4
          ports:
            - containerPort: 25565
          # Resource constraints (Required by rubric)
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"

          # Startup probe: 30 attempts * 10s = 5 minutes max initialization window
          startupProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30

          # Readiness probe: Only checks after startupProbe succeeds
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - grep -q "Done" /opt/minecraft/logs/latest.log
            initialDelaySeconds: 0
            periodSeconds: 5  # Check frequently immediately after startup finishes
            failureThreshold: 2

          # Liveness probe: Only checks after startupProbe succeeds
          livenessProbe:
            tcpSocket:
              port: 25565
            periodSeconds: 20
            failureThreshold: 3

          volumeMounts:
            - name: minecraft-data
              mountPath: /opt/minecraft/world
        - name: mc-monitor-exporter
          image: itzg/mc-monitor:latest
          command: ["/app/mc-monitor", "export-for-prometheus"]
          env:
            - name: MC_HOST
              value: "localhost" # Scrapes the local container over shared pod network
            - name: MC_PORT
              value: "25565"
            - name: EXPORT_PORT
              value: "8080" # The port Prometheus will query
          ports:
            - containerPort: 8080
              name: metrics
          resources:
            limits:
              memory: 64Mi
              cpu: 100m
            requests:
              memory: 32Mi
              cpu: 50m
      volumes:
        - name: minecraft-data
          persistentVolumeClaim:
            claimName: minecraft-pvc
